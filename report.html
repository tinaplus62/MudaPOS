    <style>
        /* ===== CSS SAMA PERSIS DENGAN HALAMAN LAIN ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, sans-serif; }
        body { background:#f5f5f5; color:#333; font-size:14px; }

    <!-- Script module utama (Firestore + IndexedDB lokal) -->
    <script type="module">
        // ========== IMPOR FIREBASE ==========
        import { auth, provider, dbCloud } from './js/firebase-config.js';
        import { signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { 
            collection, doc, getDocs, query, where, orderBy, Timestamp 
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ========== REFERENSI KOLEKSI FIRESTORE ==========
        const salesCol = collection(dbCloud, 'sales');
        const purchaseCol = collection(dbCloud, 'purchase');
        const produkCol = collection(dbCloud, 'produk');
        const customerCol = collection(dbCloud, 'customer');
        const supplierCol = collection(dbCloud, 'supplier');

        // ========== INDEXEDDB UNTUK LOGIN LOKAL ==========
        const DB_NAME = 'MudaPOSDB';
        const DB_VERSION = 1;
        const STORE_LOCAL_USERS = 'localUsers';
        let localDB = null;

        async function initLocalDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = (e) => {
                    localDB = e.target.result;
                    resolve();
                };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_LOCAL_USERS)) {
                        db.createObjectStore(STORE_LOCAL_USERS, { keyPath: 'id', autoIncrement: true });
                    }
                };
            });
        }

        async function hashPassword(password) {
            if (window.crypto && window.crypto.subtle) {
                try {
                    const encoder = new TextEncoder();
                    const data = encoder.encode(password);
                    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                } catch (e) { console.warn('Crypto digest failed, using fallback', e); }
            }
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                const char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0;
            }
            return hash.toString(16);
        }

        async function verifyLocalUser(username, password) {
            return new Promise((resolve, reject) => {
                const tx = localDB.transaction([STORE_LOCAL_USERS], 'readonly');
                const store = tx.objectStore(STORE_LOCAL_USERS);
                const request = store.getAll();
                request.onsuccess = async () => {
                    const users = request.result;
                    const user = users.find(u => u.username === username);
                    if (!user) { resolve(null); return; }
                    const hashed = await hashPassword(password);
                    if (user.password === hashed) {
                        const { password, ...safeUser } = user;
                        resolve(safeUser);
                    } else {
                        resolve(null);
                    }
                };
                request.onerror = reject;
            });
        }

        // ========== ELEMEN DOM ==========
        const loginBtn = document.getElementById('loginBtn');
        const userNameDisplay = document.getElementById('user-name-display');

        const loginModal = document.getElementById('loginModal');

        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const loginError = document.getElementById('loginError');

        const tabProduk = document.getElementById('tabProduk');
        const tabHourly = document.getElementById('tabHourly');
        const tabCustomer = document.getElementById('tabCustomer');
        const tabUtang = document.getElementById('tabUtang');
        const tabPiutang = document.getElementById('tabPiutang');
        const filterBar = document.getElementById('filterBar');
        const reportContent = document.getElementById('reportContent');
        const reportSummary = document.getElementById('reportSummary');

        let currentTab = 'produk';
        let localUser = null;

        // ========== FUNGSI LOGIN LOKAL ==========
        function showLoginModal() {
            loginModal.style.display = 'flex';
            mainContent.style.display = 'none';
        }

        function hideLoginModal() {
            loginModal.style.display = 'none';
            mainContent.style.display = 'block';
        }

        function updateLocalUI() {
            if (localUser) {
                userNameDisplay.textContent = localUser.name;
                localLogoutBtn.style.display = 'inline-block';
                localUserInfo.style.display = 'flex';
                hideLoginModal();
            } else {
                userNameDisplay.textContent = '';
                localLogoutBtn.style.display = 'none';
                localUserInfo.style.display = 'none';
                showLoginModal();
            }
        }

        // Cek sesi lokal
        const savedSession = sessionStorage.getItem('localUser');
        if (savedSession) {
            localUser = JSON.parse(savedSession);
            updateLocalUI();
            initReportPage();
        } else {
            updateLocalUI();
        }

        loginSubmit.addEventListener('click', async () => {
            const username = loginUsername.value;
            const password = loginPassword.value;
            const user = await verifyLocalUser(username, password);
            if (user) {
                sessionStorage.setItem('localUser', JSON.stringify(user));
                localUser = user;
                updateLocalUI();
                initReportPage();
            } else {
                loginError.style.display = 'block';
            }
        });

        // Fungsi logout lokal
        localLogoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('localUser');
            localUser = null;
            updateLocalUI();
        });

        // ========== FUNGSI LAPORAN ==========
        async function initReportPage() {
            setTab('produk');
        }

        // Fungsi untuk mengatur filter berdasarkan tab
        function renderFilterBar() {
            const periodOptions = `
                <option value="day">Hari Ini</option>
                <option value="week">Minggu Ini</option>
                <option value="month">Bulan Ini</option>
                <option value="year">Tahun Ini</option>
                <option value="custom">Kustom</option>
            `;
            if (currentTab === 'produk' || currentTab === 'hourly' || currentTab === 'customer') {
                filterBar.innerHTML = `
                    <div class="filter-group">
                        <label>Periode:</label>
                        <select id="periodSelect">${periodOptions}</select>
                    </div>
                    <div class="filter-group" id="customRange" style="display:none;">
                        <input type="date" id="startDate">
                        <span>s/d</span>
                        <input type="date" id="endDate">
                    </div>
                    <button class="btn" id="applyFilter"><i data-feather="filter"></i> Tampilkan</button>
                `;
            } else {
                // Untuk utang/piutang, tidak perlu filter tanggal (selalu outstanding)
                filterBar.innerHTML = `
                    <div class="filter-group">
                        <span>Menampilkan semua transaksi dengan status belum lunas</span>
                    </div>
                    <button class="btn" id="refreshBtn"><i data-feather="refresh-cw"></i> Refresh</button>
                `;
            }
            feather.replace();

            // Event listener untuk periodSelect
            const periodSelect = document.getElementById('periodSelect');
            if (periodSelect) {
                periodSelect.addEventListener('change', (e) => {
                    const customRange = document.getElementById('customRange');
                    if (customRange) {
                        customRange.style.display = e.target.value === 'custom' ? 'flex' : 'none';
                    }
                });
            }

            // Apply filter button
            const applyBtn = document.getElementById('applyFilter') || document.getElementById('refreshBtn');
            if (applyBtn) {
                applyBtn.addEventListener('click', () => {
                    loadReport();
                });
            }
        }

        // Fungsi untuk mendapatkan rentang tanggal berdasarkan pilihan periode
        function getDateRange() {
            if (currentTab === 'utang' || currentTab === 'piutang') return null;
            const period = document.getElementById('periodSelect')?.value;
            const now = new Date();
            let start, end;
            if (period === 'custom') {
                start = document.getElementById('startDate').value;
                end = document.getElementById('endDate').value;
                if (!start || !end) {
                    alert('Isi tanggal awal dan akhir');
                    return null;
                }
                start = new Date(start);
                end = new Date(end);
                end.setHours(23,59,59,999);
            } else {
                switch (period) {
                    case 'day':
                        start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23,59,59,999);
                        break;
                    case 'week':
                        const day = now.getDay(); // 0 = Minggu
                        const diff = day === 0 ? 6 : day - 1; // Senin sebagai awal minggu
                        start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diff);
                        end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + (6 - diff), 23,59,59,999);
                        break;
                    case 'month':
                        start = new Date(now.getFullYear(), now.getMonth(), 1);
                        end = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23,59,59,999);
                        break;
                    case 'year':
                        start = new Date(now.getFullYear(), 0, 1);
                        end = new Date(now.getFullYear(), 11, 31, 23,59,59,999);
                        break;
                    default:
                        start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23,59,59,999);
                }
            }
            return { start: Timestamp.fromDate(start), end: Timestamp.fromDate(end) };
        }

        // ========== LAPORAN PRODUK ==========
        async function loadProdukReport() {
            const range = getDateRange();
            if (!range) return;
            try {
                const salesSnap = await getDocs(query(salesCol, 
                    where('createdAt', '>=', range.start),
                    where('createdAt', '<=', range.end)
                ));
                const productMap = new Map(); // produkId -> { nama, totalQty, totalRevenue }
                for (const saleDoc of salesSnap.docs) {
                    const sale = saleDoc.data();
                    if (sale.items && Array.isArray(sale.items)) {
                        for (const item of sale.items) {
                            const id = item.produkId;
                            if (!id) continue;
                            if (!productMap.has(id)) {
                                const nama = item.nama || 'Produk Dihapus';
                                productMap.set(id, { nama, totalQty: 0, totalRevenue: 0 });
                            }
                            const p = productMap.get(id);
                            p.totalQty += item.qty || 0;
                            p.totalRevenue += item.subtotal || 0;
                        }
                    }
                }
                const products = Array.from(productMap.entries()).map(([id, data]) => ({
                    id,
                    nama: data.nama,
                    qty: data.totalQty,
                    revenue: data.totalRevenue
                }));
                products.sort((a, b) => b.qty - a.qty); // laris ke atas
                let html = '<table><thead><tr><th>Produk</th><th>Total Qty Terjual</th><th>Total Pendapatan</th></tr></thead><tbody>';
                let totalRevenue = 0;
                if (products.length === 0) {
                    html += '<tr><td colspan="3" style="text-align:center;">Tidak ada data</td></tr>';
                } else {
                    products.forEach(p => {
                        html += `<tr><td>${p.nama}</td><td>${p.qty}</td><td>Rp ${p.revenue.toLocaleString()}</td></tr>`;
                        totalRevenue += p.revenue;
                    });
                }
                html += '</tbody></table>';
                reportContent.innerHTML = html;
                // Tampilkan ringkasan total
                reportSummary.style.display = 'block';
                reportSummary.innerHTML = `Total Pendapatan: Rp ${totalRevenue.toLocaleString()}`;
            } catch (error) {
                console.error(error);
                reportContent.innerHTML = `<p style="color:red;">Gagal memuat: ${error.message}</p>`;
                reportSummary.style.display = 'none';
            }
        }

        // ========== LAPORAN PER JAM ==========
        async function loadHourlyReport() {
            const range = getDateRange();
            if (!range) return;
            try {
                const salesSnap = await getDocs(query(salesCol, 
                    where('createdAt', '>=', range.start),
                    where('createdAt', '<=', range.end)
                ));
                const hourMap = new Array(24).fill(0).map(() => ({ count: 0, revenue: 0 }));
                for (const saleDoc of salesSnap.docs) {
                    const sale = saleDoc.data();
                    const date = sale.createdAt?.toDate();
                    if (date) {
                        const hour = date.getHours();
                        hourMap[hour].count++;
                        // Gunakan finalTotal jika ada, fallback ke total
                        const amount = sale.finalTotal ?? sale.total ?? 0;
                        hourMap[hour].revenue += amount;
                    }
                }
                let html = '<table><thead><tr><th>Jam</th><th>Jumlah Transaksi</th><th>Total Pendapatan</th></tr></thead><tbody>';
                let totalTrans = 0, totalRev = 0;
                for (let i = 0; i < 24; i++) {
                    const data = hourMap[i];
                    if (data.count > 0) {
                        html += `<tr><td>${i}:00 - ${i+1}:00</td><td>${data.count}</td><td>Rp ${data.revenue.toLocaleString()}</td></tr>`;
                        totalTrans += data.count;
                        totalRev += data.revenue;
                    } else {
                        html += `<tr><td>${i}:00 - ${i+1}:00</td><td>0</td><td>Rp 0</td></tr>`;
                    }
                }
                html += '</tbody></table>';
                reportContent.innerHTML = html;
                reportSummary.style.display = 'block';
                reportSummary.innerHTML = `Total Transaksi: ${totalTrans} | Total Pendapatan: Rp ${totalRev.toLocaleString()}`;
            } catch (error) {
                console.error(error);
                reportContent.innerHTML = `<p style="color:red;">Gagal memuat: ${error.message}</p>`;
                reportSummary.style.display = 'none';
            }
        }

        // ========== LAPORAN PER PELANGGAN ==========
        async function loadCustomerReport() {
            const range = getDateRange();
            if (!range) return;
            try {
                const salesSnap = await getDocs(query(salesCol, 
                    where('createdAt', '>=', range.start),
                    where('createdAt', '<=', range.end)
                ));
                const custMap = new Map(); // customerId -> { nama, totalQty, totalRevenue }
                for (const saleDoc of salesSnap.docs) {
                    const sale = saleDoc.data();
                    const custId = sale.customerId || 'umum';
                    const custName = sale.customerName || 'Umum';
                    if (!custMap.has(custId)) {
                        custMap.set(custId, { nama: custName, totalQty: 0, totalRevenue: 0 });
                    }
                    const c = custMap.get(custId);
                    if (sale.items) {
                        sale.items.forEach(item => {
                            c.totalQty += item.qty || 0;
                        });
                    }
                    c.totalRevenue += sale.finalTotal ?? sale.total ?? 0;
                }
                const customers = Array.from(custMap.entries()).map(([id, data]) => ({
                    id,
                    nama: data.nama,
                    qty: data.totalQty,
                    revenue: data.totalRevenue
                }));
                customers.sort((a, b) => b.revenue - a.revenue);
                let html = '<table><thead><tr><th>Pelanggan</th><th>Total Qty</th><th>Total Belanja</th></tr></thead><tbody>';
                let totalCustRev = 0;
                if (customers.length === 0) {
                    html += '<tr><td colspan="3" style="text-align:center;">Tidak ada data</td></tr>';
                } else {
                    customers.forEach(c => {
                        html += `<tr><td>${c.nama}</td><td>${c.qty}</td><td>Rp ${c.revenue.toLocaleString()}</td></tr>`;
                        totalCustRev += c.revenue;
                    });
                }
                html += '</tbody></table>';
                reportContent.innerHTML = html;
                reportSummary.style.display = 'block';
                reportSummary.innerHTML = `Total Belanja Semua Pelanggan: Rp ${totalCustRev.toLocaleString()}`;
            } catch (error) {
                console.error(error);
                reportContent.innerHTML = `<p style="color:red;">Gagal memuat: ${error.message}</p>`;
                reportSummary.style.display = 'none';
            }
        }

        // ========== LAPORAN UTANG ==========
        async function loadUtangReport() {
            try {
                // Gunakan field outstanding (bukan utang)
                const purchaseSnap = await getDocs(query(purchaseCol, where('outstanding', '>', 0)));
                if (purchaseSnap.empty) {
                    reportContent.innerHTML = '<p style="text-align:center;">Tidak ada utang</p>';
                    reportSummary.style.display = 'none';
                    return;
                }
                const suppMap = new Map();
                for (const purchaseDoc of purchaseSnap.docs) {
                    const p = purchaseDoc.data();
                    const suppId = p.supplierId;
                    const suppName = p.supplierName || 'Unknown';
                    if (!suppMap.has(suppId)) {
                        suppMap.set(suppId, { nama: suppName, totalUtang: 0 });
                    }
                    const item = suppMap.get(suppId);
                    item.totalUtang += p.outstanding || 0;
                }
                let html = '<table><thead><tr><th>Supplier</th><th>Total Utang</th></tr></thead><tbody>';
                let totalUtang = 0;
                for (let [suppId, data] of suppMap.entries()) {
                    html += `<tr><td>${data.nama}</td><td>Rp ${data.totalUtang.toLocaleString()}</td></tr>`;
                    totalUtang += data.totalUtang;
                }
                html += '</tbody></table>';
                reportContent.innerHTML = html;
                reportSummary.style.display = 'block';
                reportSummary.innerHTML = `Total Utang: Rp ${totalUtang.toLocaleString()}`;
            } catch (error) {
                console.error(error);
                reportContent.innerHTML = `<p style="color:red;">Gagal memuat: ${error.message}</p>`;
                reportSummary.style.display = 'none';
            }
        }

        // ========== LAPORAN PIUTANG ==========
        async function loadPiutangReport() {
            try {
                const salesSnap = await getDocs(query(salesCol, where('outstanding', '>', 0)));
                if (salesSnap.empty) {
                    reportContent.innerHTML = '<p style="text-align:center;">Tidak ada piutang</p>';
                    reportSummary.style.display = 'none';
                    return;
                }
                const custMap = new Map();
                for (const saleDoc of salesSnap.docs) {
                    const s = saleDoc.data();
                    const custId = s.customerId;
                    const custName = s.customerName || 'Unknown';
                    if (!custMap.has(custId)) {
                        custMap.set(custId, { nama: custName, totalPiutang: 0 });
                    }
                    const item = custMap.get(custId);
                    item.totalPiutang += s.outstanding || 0;
                }
                let html = '<table><thead><tr><th>Pelanggan</th><th>Total Piutang</th></tr></thead><tbody>';
                let totalPiutang = 0;
                for (let [custId, data] of custMap.entries()) {
                    html += `<tr><td>${data.nama}</td><td>Rp ${data.totalPiutang.toLocaleString()}</td></tr>`;
                    totalPiutang += data.totalPiutang;
                }
                html += '</tbody></table>';
                reportContent.innerHTML = html;
                reportSummary.style.display = 'block';
                reportSummary.innerHTML = `Total Piutang: Rp ${totalPiutang.toLocaleString()}`;
            } catch (error) {
                console.error(error);
                reportContent.innerHTML = `<p style="color:red;">Gagal memuat: ${error.message}</p>`;
                reportSummary.style.display = 'none';
            }
        }

        // Fungsi utama memuat laporan sesuai tab
        function loadReport() {
            reportSummary.style.display = 'none';
            if (currentTab === 'produk') loadProdukReport();
            else if (currentTab === 'hourly') loadHourlyReport();
            else if (currentTab === 'customer') loadCustomerReport();
            else if (currentTab === 'utang') loadUtangReport();
            else if (currentTab === 'piutang') loadPiutangReport();
        }

        // Ganti tab
        function setTab(tab) {
            currentTab = tab;
            [tabProduk, tabHourly, tabCustomer, tabUtang, tabPiutang].forEach(t => t.classList.remove('active'));
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            renderFilterBar();
            loadReport();
        }

        tabProduk.addEventListener('click', () => setTab('produk'));
        tabHourly.addEventListener('click', () => setTab('hourly'));
        tabCustomer.addEventListener('click', () => setTab('customer'));
        tabUtang.addEventListener('click', () => setTab('utang'));
        tabPiutang.addEventListener('click', () => setTab('piutang'));

        // ========== AUTH FIREBASE (tetap ada, untuk login/out utama) ==========
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.innerHTML = '<i data-feather="log-out" width="18"></i><span>Logout</span>';
            } else {
                loginBtn.innerHTML = '<i data-feather="log-in" width="18"></i><span>Login</span>';
            }
            feather.replace();
        });

        loginBtn.addEventListener('click', async () => {
            const user = auth.currentUser;
            if (user) {
                try { await signOut(auth); } catch (error) { alert('Gagal logout: ' + error.message); }
            } else {
                try { await signInWithPopup(auth, provider); } catch (error) { alert('Gagal login: ' + error.message); }
            }
        });

        // Inisialisasi IndexedDB lokal
        await initLocalDB();
    </script>
</body>
